<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 知识研究</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            line-height: 1.7;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 12px;
        }
        header {
            text-align: center;
            padding: 32px 16px;
            background: linear-gradient(135deg, #1a2a6c 0%, #2d4a8a 50%, #4a6fa5 100%);
            color: white;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(26, 42, 108, 0.25);
        }
        header h1 {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        header .subtitle {
            font-size: 0.85em;
            opacity: 0.85;
            font-weight: 300;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-left: 4px solid #4a6fa5;
        }
        .card h2 {
            font-size: 1.15em;
            color: #1a2a6c;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f7;
        }
        .report-list {
            list-style: none;
            padding: 0;
        }
        .report-item {
            padding: 16px;
            border-radius: 8px;
            background: #f8fafc;
            margin-bottom: 12px;
            transition: all 0.3s;
            border: 1px solid #e8ecf1;
        }
        .report-item:hover {
            background: #eef2f7;
            border-color: #4a6fa5;
        }
        .report-item a {
            color: #1a2a6c;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            display: block;
            margin-bottom: 6px;
        }
        .report-item .date {
            font-size: 0.85em;
            color: #666;
        }
        .report-item .desc {
            font-size: 0.9em;
            color: #4a5568;
            margin-top: 6px;
            line-height: 1.6;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            margin-top: 8px;
            margin-right: 6px;
        }
        .tag-hot {
            background: #fee;
            color: #c33;
        }
        .tag-new {
            background: #e8f5e9;
            color: #2e7d32;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.85em;
            margin-top: 20px;
        }
        /* 平板 */
        @media (min-width: 768px) {
            .container {
                padding: 24px 20px;
            }
            header {
                padding: 48px 24px;
                margin-bottom: 32px;
            }
            header h1 {
                font-size: 1.8em;
            }
            header .subtitle {
                font-size: 1em;
            }
            .card {
                padding: 28px;
                margin-bottom: 20px;
            }
            .card h2 {
                font-size: 1.3em;
            }
            .report-item {
                padding: 20px;
            }
            .report-item a {
                font-size: 1.1em;
            }
        }
        /* 桌面端 */
        @media (min-width: 1024px) {
            .container {
                padding: 40px 24px;
            }
            header {
                padding: 60px 24px;
            }
            header h1 {
                font-size: 2.2em;
            }
            header .subtitle {
                font-size: 1.1em;
            }
            .card {
                padding: 32px;
            }
            .card h2 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 知识研究</h1>
            <div class="subtitle">深度产业洞察与战略分析</div>
        </header>

        <div class="card">
            <h2>研究报告</h2>
            <ul class="report-list">
                <li class="report-item">
                    <a href="pages/stock_research/07-02%20AI%E4%B8%8A%E6%B8%B8%E7%AE%97%E5%8A%9B%E4%BA%A7%E4%B8%9A%E9%93%BE%E5%8D%87%E7%BA%A7.html">AI 上游算力产业链升级报告</a>
                    <div class="date">2026-07-02</div>
                    <div class="desc">从"廉价代工"到"战略定价权"的结构性升级分析。深度解析中国 AI 上游算力产业链如何通过原材料管控、分级定价、纳米升级三大战略，实现利润占比从 3% 提升至 30% 以上的跃升路径。</div>
                    <span class="tag tag-hot">热门</span>
                    <span class="tag tag-new">深度报告</span>
                </li>
            </ul>
        </div>

        <footer>
            <p>AI 知识研究 | 基于 GitHub Pages 构建</p>
        </footer>
    </div>
</body>
</html>
